<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <!-- Glow filter for neon effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Scanline pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    </pattern>
    <!-- Grid pattern for background -->
    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,136,0.04)" stroke-width="0.5"/>
    </pattern>
    <!-- Radial gradient for scope vignette -->
    <radialGradient id="scopeVignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,255,136,0.06)"/>
      <stop offset="70%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </radialGradient>
    <clipPath id="roundedBanner">
      <rect width="900" height="320" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedBanner)">
    <!-- Background -->
    <rect width="900" height="320" fill="#0a0e14"/>
    <rect width="900" height="320" fill="url(#grid)"/>
    <rect width="900" height="320" fill="url(#scopeVignette)"/>

    <!-- Decorative corner brackets -->
    <g stroke="#00ff88" stroke-width="1.5" fill="none" opacity="0.3">
      <path d="M 20 50 L 20 20 L 50 20"/>
      <path d="M 850 20 L 880 20 L 880 50"/>
      <path d="M 20 270 L 20 300 L 50 300"/>
      <path d="M 850 300 L 880 300 L 880 270"/>
    </g>

    <!-- Crosshair / scope — centered at 200, 160 -->
    <g transform="translate(200, 160)" filter="url(#glow)">
      <!-- Outer ring -->
      <circle cx="0" cy="0" r="90" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.25"/>
      <!-- Mid ring with dashes -->
      <circle cx="0" cy="0" r="65" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-dasharray="10 6" opacity="0.55">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="240s" repeatCount="indefinite"/>
      </circle>
      <!-- Inner ring -->
      <circle cx="0" cy="0" r="40" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>

      <!-- Crosshair lines -->
      <line x1="0" y1="-95" x2="0" y2="-45" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
      <line x1="0" y1="45" x2="0" y2="95" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
      <line x1="-95" y1="0" x2="-45" y2="0" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
      <line x1="45" y1="0" x2="95" y2="0" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>

      <!-- Tick marks on crosshair -->
      <g stroke="#00ff88" stroke-width="1" opacity="0.5">
        <line x1="-5" y1="-70" x2="5" y2="-70"/>
        <line x1="-5" y1="-55" x2="5" y2="-55"/>
        <line x1="-5" y1="70" x2="5" y2="70"/>
        <line x1="-5" y1="55" x2="5" y2="55"/>
        <line x1="-70" y1="-5" x2="-70" y2="5"/>
        <line x1="-55" y1="-5" x2="-55" y2="5"/>
        <line x1="70" y1="-5" x2="70" y2="5"/>
        <line x1="55" y1="-5" x2="55" y2="5"/>
      </g>

      <!-- Center dot -->
      <circle cx="0" cy="0" r="3" fill="#00ff88" opacity="0.9" filter="url(#glowStrong)"/>

      <!-- GPU icon in center of crosshair -->
      <g transform="translate(-18, -18)" opacity="0.85">
        <!-- GPU chip body -->
        <rect x="6" y="6" width="24" height="24" rx="3" fill="none" stroke="#00ff88" stroke-width="1.5"/>
        <!-- GPU die -->
        <rect x="12" y="12" width="12" height="12" rx="1" fill="rgba(0,255,136,0.15)" stroke="#00ff88" stroke-width="1"/>
        <!-- Pins top -->
        <line x1="12" y1="6" x2="12" y2="1" stroke="#00ff88" stroke-width="1.2"/>
        <line x1="18" y1="6" x2="18" y2="1" stroke="#00ff88" stroke-width="1.2"/>
        <line x1="24" y1="6" x2="24" y2="1" stroke="#00ff88" stroke-width="1.2"/>
        <!-- Pins bottom -->
        <line x1="12" y1="30" x2="12" y2="35" stroke="#00ff88" stroke-width="1.2"/>
        <line x1="18" y1="30" x2="18" y2="35" stroke="#00ff88" stroke-width="1.2"/>
        <line x1="24" y1="30" x2="24" y2="35" stroke="#00ff88" stroke-width="1.2"/>
        <!-- Pins left -->
        <line x1="6" y1="12" x2="1" y2="12" stroke="#00ff88" stroke-width="1.2"/>
        <line x1="6" y1="18" x2="1" y2="18" stroke="#00ff88" stroke-width="1.2"/>
        <line x1="6" y1="24" x2="1" y2="24" stroke="#00ff88" stroke-width="1.2"/>
        <!-- Pins right -->
        <line x1="30" y1="12" x2="35" y2="12" stroke="#00ff88" stroke-width="1.2"/>
        <line x1="30" y1="18" x2="35" y2="18" stroke="#00ff88" stroke-width="1.2"/>
        <line x1="30" y1="24" x2="35" y2="24" stroke="#00ff88" stroke-width="1.2"/>
      </g>

    </g>

    <!-- Title text -->
    <g transform="translate(380, 140)">
      <text font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="48" font-weight="700" letter-spacing="-1">
        <tspan fill="#e8ede9" filter="url(#softGlow)">runpod-</tspan><tspan fill="#00ff88" filter="url(#glowStrong)">sniper</tspan>
      </text>
    </g>

    <!-- Tagline -->
    <text x="380" y="180" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="#5a7a66" letter-spacing="0.5">
      grab that GPU before someone else does
    </text>

    <!-- Status bar at bottom -->
    <g transform="translate(380, 215)">
      <!-- Pill badges -->
      <g>
        <rect x="0" y="0" width="80" height="22" rx="4" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.7" opacity="0.6"/>
        <text x="40" y="15" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#00ff88" text-anchor="middle" opacity="0.8">zero deps</text>
      </g>
      <g>
        <rect x="90" y="0" width="195" height="22" rx="4" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.7" opacity="0.6"/>
        <text x="187" y="15" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#00ff88" text-anchor="middle" opacity="0.8">push notif when pod deploys</text>
      </g>
      <g>
        <rect x="295" y="0" width="118" height="22" rx="4" fill="rgba(0,255,136,0.1)" stroke="#00ff88" stroke-width="0.7" opacity="0.6"/>
        <text x="354" y="15" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#00ff88" text-anchor="middle" opacity="0.8">never gives up</text>
      </g>
    </g>

    <!-- Scanline overlay -->
    <rect width="900" height="320" fill="url(#scanlines)" opacity="0.5"/>
  </g>
</svg>
